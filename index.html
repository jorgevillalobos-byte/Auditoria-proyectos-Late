<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Sistema de Cotizaciones Ecommerce</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f6f9;
      margin: 0;
      padding: 25px;
      color: #1f2937;
    }

    .container {
      max-width: 1100px;
      margin: auto;
      background: white;
      padding: 25px;
      border-radius: 16px;
      box-shadow: 0 4px 18px rgba(0,0,0,0.12);
    }

    h1, h2 {
      text-align: center;
      color: #0f172a;
    }

    .tabs {
      display: flex;
      gap: 10px;
      margin-bottom: 25px;
    }

    .tabs button {
      flex: 1;
      padding: 14px;
      border: none;
      border-radius: 10px;
      font-weight: bold;
      cursor: pointer;
      background: #e5e7eb;
    }

    .tabs button.active {
      background: #0f172a;
      color: white;
    }

    .section {
      display: none;
    }

    .section.active {
      display: block;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 15px;
    }

    label {
      font-weight: bold;
      display: block;
      margin-bottom: 5px;
      margin-top: 10px;
    }

    input, select, textarea {
      width: 100%;
      padding: 10px;
      border: 1px solid #cbd5e1;
      border-radius: 8px;
      box-sizing: border-box;
    }

    textarea {
      min-height: 110px;
    }

    .full {
      grid-column: 1 / -1;
    }

    .btn {
      margin-top: 20px;
      width: 100%;
      background: #2563eb;
      color: white;
      padding: 14px;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
    }

    .btn:hover {
      background: #1d4ed8;
    }

    .note {
      background: #f8fafc;
      border-left: 5px solid #2563eb;
      padding: 15px;
      border-radius: 8px;
      margin-bottom: 20px;
    }

    .success {
      color: #16a34a;
      font-weight: bold;
      text-align: center;
      margin-top: 15px;
    }

    .error {
      color: #dc2626;
      font-weight: bold;
      text-align: center;
      margin-top: 15px;
    }
  </style>
</head>

<body>

<div class="container">
  <h1>Sistema de Cotizaciones Ecommerce</h1>

  <div class="tabs">
    <button class="active" onclick="mostrarSeccion('solicitud', this)">Solicitar Cotización</button>
    <button onclick="mostrarSeccion('respuesta', this)">Responder Solicitud</button>
  </div>

  <div id="solicitud" class="section active">
    <h2>Solicitar Cotización</h2>

    <div class="note">
      Este formulario envía la solicitud a Hamyrich, Mildred, Erlys y Jorge.
    </div>

    <div class="grid">
      <div>
        <label>Solicitante interno</label>
        <input id="solicitante" placeholder="Ej. Jorge Villalobos">
      </div>

      <div>
        <label>Cliente</label>
        <input id="cliente" placeholder="Nombre del cliente">
      </div>

      <div>
        <label>Teléfono</label>
        <input id="telefono" placeholder="Teléfono / WhatsApp">
      </div>

      <div>
        <label>Correo del cliente</label>
        <input id="correoCliente" type="email" placeholder="cliente@email.com">
      </div>

      <div>
        <label>Tipo de ecommerce</label>
        <select id="tipoEcommerce">
          <option>Básico - Tienda pequeña</option>
          <option>Intermedio - Tienda profesional</option>
          <option>Avanzado - Ecommerce personalizado</option>
        </select>
      </div>

      <div>
        <label>Cantidad de productos</label>
        <select id="productos">
          <option>1 a 20 productos</option>
          <option>21 a 50 productos</option>
          <option>51 a 100 productos</option>
          <option>Más de 100 productos</option>
        </select>
      </div>

      <div>
        <label>Diseño</label>
        <select id="diseno">
          <option>Plantilla base</option>
          <option>Diseño semi personalizado</option>
          <option>Diseño 100% personalizado</option>
        </select>
      </div>

      <div>
        <label>Integraciones</label>
        <select id="integraciones">
          <option>Sin integraciones</option>
          <option>WhatsApp / Redes Sociales</option>
          <option>CRM / Email Marketing</option>
          <option>Inventario / ERP / API</option>
        </select>
      </div>

      <div>
        <label>Urgencia</label>
        <select id="urgencia">
          <option>Normal</option>
          <option>Urgente</option>
          <option>Prioridad alta</option>
        </select>
      </div>

      <div class="full">
        <label>Comentarios del proyecto</label>
        <textarea id="comentarios" placeholder="Describe el proyecto, funcionalidades, referencias, necesidades del cliente, etc."></textarea>
      </div>
    </div>

    <button class="btn" onclick="enviarSolicitud()">Enviar Solicitud</button>
    <div id="mensajeSolicitud"></div>
  </div>

  <div id="respuesta" class="section">
    <h2>Responder Solicitud</h2>

    <div class="note">
      Esta respuesta se envía al cliente con copia a Mildred, Erlys y Jorge. Si el cliente responde, la respuesta irá dirigida a Hamyrich.
    </div>

    <div class="grid">
      <div>
        <label>Cliente</label>
        <input id="respCliente" placeholder="Nombre del cliente">
      </div>

      <div>
        <label>Correo del cliente</label>
        <input id="respCorreoCliente" type="email" placeholder="cliente@email.com">
      </div>

      <div>
        <label>Precio final USD</label>
        <input id="precioFinal" type="number" placeholder="Ej. 2500">
      </div>

      <div>
        <label>Tiempo estimado</label>
        <input id="tiempoEstimado" placeholder="Ej. 20 días hábiles">
      </div>

      <div class="full">
        <label>Respuesta / propuesta</label>
        <textarea id="respuestaTexto" placeholder="Escribe aquí la respuesta que recibirá el cliente"></textarea>
      </div>

      <div class="full">
        <label>Observaciones adicionales</label>
        <textarea id="observaciones" placeholder="Notas adicionales"></textarea>
      </div>
    </div>

    <button class="btn" onclick="enviarRespuesta()">Enviar Respuesta al Cliente</button>
    <div id="mensajeRespuesta"></div>
  </div>
</div>

<script>
  const SCRIPT_URL = "https://script.google.com/a/macros/eliteonlinemedia.com/s/AKfycbyP01cBzS2m6uY-v_cK7Fz2FT78RUj6BOiu7vAiBY6SJoAH7rRhKL-WV9NUpvzZR_fG/exec";

  function mostrarSeccion(id, btn) {
    document.querySelectorAll(".section").forEach(function(section) {
      section.classList.remove("active");
    });

    document.querySelectorAll(".tabs button").forEach(function(button) {
      button.classList.remove("active");
    });

    document.getElementById(id).classList.add("active");
    btn.classList.add("active");
  }

  function enviarPayload(data, mensajeId) {
    document.getElementById(mensajeId).innerHTML = "<div>Enviando...</div>";

    fetch(SCRIPT_URL, {
      method: "POST",
      mode: "no-cors",
      headers: {
        "Content-Type": "application/x-www-form-urlencoded"
      },
      body: "payload=" + encodeURIComponent(JSON.stringify(data))
    });

    document.getElementById(mensajeId).innerHTML =
      '<div class="success">Enviado correctamente.</div>';
  }

  function enviarSolicitud() {
    const cliente = document.getElementById("cliente").value.trim();
    const correoCliente = document.getElementById("correoCliente").value.trim();

    if (!cliente || !correoCliente) {
      document.getElementById("mensajeSolicitud").innerHTML =
        '<div class="error">Completa cliente y correo del cliente.</div>';
      return;
    }

    const data = {
      tipoFormulario: "solicitud",
      solicitante: document.getElementById("solicitante").value.trim(),
      cliente: cliente,
      telefono: document.getElementById("telefono").value.trim(),
      correoCliente: correoCliente,
      tipoEcommerce: document.getElementById("tipoEcommerce").value,
      productos: document.getElementById("productos").value,
      diseno: document.getElementById("diseno").value,
      integraciones: document.getElementById("integraciones").value,
      urgencia: document.getElementById("urgencia").value,
      comentarios: document.getElementById("comentarios").value.trim()
    };

    enviarPayload(data, "mensajeSolicitud");
  }

  function enviarRespuesta() {
    const cliente = document.getElementById("respCliente").value.trim();
    const correoCliente = document.getElementById("respCorreoCliente").value.trim();
    const respuesta = document.getElementById("respuestaTexto").value.trim();

    if (!cliente || !correoCliente || !respuesta) {
      document.getElementById("mensajeRespuesta").innerHTML =
        '<div class="error">Completa cliente, correo del cliente y respuesta.</div>';
      return;
    }

    const data = {
      tipoFormulario: "respuesta",
      cliente: cliente,
      correoCliente: correoCliente,
      precioFinal: document.getElementById("precioFinal").value.trim(),
      tiempoEstimado: document.getElementById("tiempoEstimado").value.trim(),
      respuesta: respuesta,
      observaciones: document.getElementById("observaciones").value.trim()
    };

    enviarPayload(data, "mensajeRespuesta");
  }
</script>

</body>
</html>
